display_information:
  name: Jam Bot
  description: Permanent Spotify Jam host for our channel.
  background_color: "#1DB954"
features:
  bot_user:
    display_name: Jam Bot
    always_online: true
  slash_commands:
    - command: /play
      description: Play a song now
      usage_hint: "<song or artist>"
      should_escape: false
    - command: /queue
      description: Add a song to the queue
      usage_hint: "<song or artist>"
      should_escape: false
    - command: /skip
      description: Skip the current track
      usage_hint: ""
      should_escape: false
    - command: /nowplaying
      description: Show what's playing
      usage_hint: ""
      should_escape: false
    - command: /history
      description: Show recent Jam history
      usage_hint: ""
      should_escape: false
oauth_config:
  scopes:
    bot:
      # Minimum needed for: read messages in the configured public channel,
      # post replies, run slash commands, and resolve user IDs for "@user"
      # attribution. Add groups:history / im:history yourself if you want the
      # bot to also work in private channels or DMs.
      - app_mentions:read
      - channels:history
      - chat:write
      - commands
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
