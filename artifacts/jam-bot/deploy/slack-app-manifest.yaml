display_information:
  name: Jam Bot
  description: Permanent Spotify Jam host for our channel.
  background_color: "#1DB954"
features:
  unfurl_domains:
    - open.spotify.com
    - music.apple.com
    - music.youtube.com
    - bandcamp.com
    - soundcloud.com
    - tidal.com
  app_home:
    # Show the Messages tab in the bot's App Home and allow users to type
    # there. Required so the host can DM the bot natural-language commands
    # ("play X", "skip", "start a jam") in addition to slash commands.
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Jam Bot
    always_online: true
  slash_commands:
    - command: /play
      description: Play a song now
      usage_hint: "<song or artist>"
      should_escape: false
    - command: /queue
      description: Add a song to the queue
      usage_hint: "<song or artist>"
      should_escape: false
    - command: /skip
      description: Skip the current track
      should_escape: false
    - command: /nowplaying
      description: Show what's playing
      should_escape: false
    - command: /history
      description: Show recent Jam history
      should_escape: false
    - command: /wrapped
      description: Show this week's Jam Wrapped recap
      should_escape: false
    - command: /dna
      description: Show a user's taste DNA card
      usage_hint: "[@user]"
      should_escape: false
    - command: /compat
      description: Compare two users' musical compatibility
      usage_hint: "@userA @userB"
      should_escape: false
    - command: /memory
      description: Ask the Jam history a question, or play a curated set
      usage_hint: "<question or play-me-a-set request>"
      should_escape: false
    - command: /jam
      description: Start a Spotify Jam (social listening) session
      should_escape: false
    - command: /jamoptout
      description: Opt out of (or back into) personal Wrapped stats
      usage_hint: "[off]"
      should_escape: false
    - command: /turntable
      description: Sync the Jam to a record playing on the host's turntable
      usage_hint: "start | stop | resync | status"
      should_escape: false
oauth_config:
  scopes:
    bot:
      # Minimum needed for: read messages in the configured public channel,
      # post replies, run slash commands, and resolve user IDs for "@user"
      # attribution. Add groups:history / im:history yourself if you want the
      # bot to also work in private channels or DMs.
      - app_mentions:read
      - channels:history
      - chat:write
      - commands
      - users:read
      # Required for the bot to DM the configured JAM_QUIET_DM_USER (host) —
      # both for the host to DM the bot natural-language commands and for the
      # bot to route a DM-started tour's cards/tidbits back to that DM.
      - im:write
      - im:history
      - im:read
      - mpim:history
      # Required for music service link unfurling: links:read lets Slack
      # deliver link_shared events to the bot; links:write lets the bot call
      # chat.unfurl to replace the default Slack preview with a Lore card.
      - links:read
      - links:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      # Music service link unfurling — fires whenever a subscribed domain URL
      # is posted anywhere in the workspace. Handled by linkUnfurl.ts.
      - link_shared
      # Lets the host DM the bot natural-language commands ("play X",
      # "skip", "start a jam", etc). The handler ignores DMs from anyone
      # other than the configured JAM_QUIET_DM_USER.
      - message.im
      # Required for active engagement (thread mode): after she's @mentioned
      # in a thread she keeps answering follow-up replies in that thread
      # WITHOUT a re-mention until dismissed or the session times out. This
      # delivers those un-mentioned channel-thread replies. Uses the existing
      # channels:history scope. Without it she'll only reply when re-mentioned.
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
