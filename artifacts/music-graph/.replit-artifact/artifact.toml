kind = "web"
previewPath = "/"
title = "Music Graph"
version = "1.0.0"
id = "artifacts/music-graph"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26102

[services.development]
run = "pnpm --filter @workspace/music-graph run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-graph", "run", "build" ]
publicDir = "artifacts/music-graph/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26102"
BASE_PATH = "/"
