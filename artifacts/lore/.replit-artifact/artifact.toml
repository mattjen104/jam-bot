kind = "web"
previewPath = "/lore/"
title = "Lore Radio"
version = "1.0.0"
id = "artifacts/lore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lore/" ]
localPort = 24224

[services.development]
run = "pnpm --filter @workspace/lore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lore", "run", "build" ]
publicDir = "artifacts/lore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24224"
BASE_PATH = "/lore/"
