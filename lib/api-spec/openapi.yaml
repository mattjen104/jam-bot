openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: song
    description: Song-context enrichment (graph + dossier)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /song/resolve:
    get:
      operationId: resolveSong
      tags: [song]
      summary: Resolve free-text to a Spotify track
      description: >
        Resolves a free-text query (e.g. "kashmir led zeppelin") to a single
        best-match Spotify track, including the public Spotify oEmbed embed HTML
        for the anchor player node.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Resolved track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedSong"
        "404":
          description: No match found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Spotify not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/{trackId}/context:
    get:
      operationId: getSongContext
      tags: [song]
      summary: Consolidated song-context dossier
      description: >
        Returns the same enrichment the jam-bot Slack track card serves —
        credits/pressing (knowledge), genre/era/bio/links (context), the
        artist's playable catalogue, cross-platform links, and timed insights.
        Every section degrades to null/empty when its source is unconfigured or
        has no data.
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Song context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongContext"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/oembed:
    get:
      operationId: getOembed
      tags: [song]
      summary: Spotify oEmbed passthrough
      description: >
        Public Spotify oEmbed passthrough for an open.spotify.com URL. Requires
        no Spotify credentials.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: oEmbed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OEmbed"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Credit:
      type: object
      properties:
        role:
          type: string
        name:
          type: string
        artistId:
          type: ["string", "null"]
      required:
        - role
        - name
    DiscogsPressing:
      type: object
      properties:
        label:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        country:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
    SongRelationship:
      type: object
      description: >-
        A typed, directional song-to-song relationship parsed from MusicBrainz.
        direction="forward" means THIS song is the source (it samples / is a
        cover of / is a remix of / interpolates the target); "backward" means the
        related entity does so to THIS song. The web graph renders each as a
        typed edge to a node identified by targetType + targetId.
      properties:
        kind:
          type: string
          enum: [sample, cover, remix, interpolation]
        direction:
          type: string
          enum: [forward, backward]
        label:
          type: string
        title:
          type: string
        artist:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        targetType:
          type: string
          enum: [recording, work]
        targetId:
          type: string
        mbUrl:
          type: string
      required:
        - kind
        - direction
        - label
        - title
        - targetType
        - targetId
        - mbUrl
    TrackKnowledge:
      type: object
      properties:
        recordingId:
          type: ["string", "null"]
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        personnel:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        pressing:
          anyOf:
            - $ref: "#/components/schemas/DiscogsPressing"
            - type: "null"
        relationships:
          type: array
          items:
            $ref: "#/components/schemas/SongRelationship"
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - personnel
        - approximate
        - fetchedAtMs
    TrackContext:
      type: object
      properties:
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        similarArtists:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        wikipediaUrl:
          type: ["string", "null"]
        geniusUrl:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - tags
        - similarArtists
        - approximate
        - fetchedAtMs
    CatalogueTrack:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        title:
          type: string
      required:
        - id
        - uri
        - title
    CatalogueAlbum:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        year:
          type: ["integer", "null"]
        url:
          type: string
      required:
        - id
        - name
        - url
    ArtistCatalogue:
      type: object
      properties:
        artistId:
          type: string
        artistName:
          type: string
        artistUrl:
          type: string
        topTracks:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueTrack"
        albums:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueAlbum"
      required:
        - artistId
        - artistName
        - artistUrl
        - topTracks
        - albums
    TrackLink:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
      required:
        - name
        - url
    TrackLinks:
      type: object
      properties:
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/TrackLink"
        pageUrl:
          type: ["string", "null"]
        fetchedAtMs:
          type: number
      required:
        - platforms
        - fetchedAtMs
    TrackInsight:
      type: object
      properties:
        positionMs:
          type: number
        text:
          type: string
      required:
        - positionMs
        - text
    ResolvedSong:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        artists:
          type: array
          items:
            type: string
        album:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        spotifyUrl:
          type: string
        oEmbedHtml:
          type: ["string", "null"]
      required:
        - id
        - name
        - artists
        - spotifyUrl
    SongContext:
      type: object
      properties:
        track:
          $ref: "#/components/schemas/ResolvedSong"
        knowledge:
          anyOf:
            - $ref: "#/components/schemas/TrackKnowledge"
            - type: "null"
        context:
          anyOf:
            - $ref: "#/components/schemas/TrackContext"
            - type: "null"
        catalogue:
          anyOf:
            - $ref: "#/components/schemas/ArtistCatalogue"
            - type: "null"
        links:
          anyOf:
            - $ref: "#/components/schemas/TrackLinks"
            - type: "null"
        insights:
          type: array
          items:
            $ref: "#/components/schemas/TrackInsight"
      required:
        - track
        - insights
    OEmbed:
      type: object
      properties:
        html:
          type: string
        title:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        provider_name:
          type: ["string", "null"]
      required:
        - html
