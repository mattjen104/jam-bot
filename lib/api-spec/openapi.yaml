openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: song
    description: Song-context enrichment (graph + dossier)
  - name: stations
    description: Lore — curated radio stations + now-playing resolution
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /song/resolve:
    get:
      operationId: resolveSong
      tags: [song]
      summary: Resolve free-text to a Spotify track
      description: >
        Resolves a free-text query (e.g. "kashmir led zeppelin") to a single
        best-match Spotify track, including the public Spotify oEmbed embed HTML
        for the anchor player node.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Resolved track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedSong"
        "404":
          description: No match found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Spotify not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/{trackId}/context:
    get:
      operationId: getSongContext
      tags: [song]
      summary: Consolidated song-context dossier
      description: >
        Returns the same enrichment the jam-bot Slack track card serves —
        credits/pressing (knowledge), genre/era/bio/links (context), the
        artist's playable catalogue, cross-platform links, and timed insights.
        Every section degrades to null/empty when its source is unconfigured or
        has no data.
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Song context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongContext"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/oembed:
    get:
      operationId: getOembed
      tags: [song]
      summary: Spotify oEmbed passthrough
      description: >
        Public Spotify oEmbed passthrough for an open.spotify.com URL. Requires
        no Spotify credentials.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: oEmbed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OEmbed"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /stations:
    get:
      operationId: listStations
      tags: [stations]
      summary: List curated radio stations
      description: >
        The public directory of curated, high-quality radio stations. Each
        station carries its own sanctioned live stream URL (played unmodified),
        a quality badge, and attribution links (homepage + donate).
      responses:
        "200":
          description: Station directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationList"
  /stations/{slug}/now-playing:
    get:
      operationId: getStationNowPlaying
      tags: [stations]
      summary: Current track on a station, resolved to the MBID spine
      description: >
        The most recent spin logged for a station, resolved (best-effort) to a
        MusicBrainz Recording ID with cross-service deep links and artwork. The
        `nowPlaying` field is null when nothing has been logged yet.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Station with its current now-playing track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationNowPlaying"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}/spins:
    get:
      operationId: getRecordingSpins
      tags: [recordings]
      summary: Where a recording has been played, with attribution
      description: >
        Every logged spin of a recording (newest first), each attributed to the
        station and — when the source exposes it — the show and DJ. This is the
        play-history surface for a track page.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording's spins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingSpins"
  /recordings/{mbid}/segues:
    get:
      operationId: getRecordingSegues
      tags: [recordings]
      summary: Songs observed playing next (Segue mode)
      description: >
        Real DJ transitions observed after this recording, ranked by a
        station-class-weighted frequency so curated/community segues outrank
        commercial ones. Powers Segue mode.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Ranked next-song candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegueNextList"
  /admin/spins:
    post:
      operationId: createManualSpin
      tags: [admin]
      summary: Admin-only manual/historical spin entry
      description: >
        Log a spin by hand for historical reconstruction, resolved to the MBID
        spine and stored with source="manual" and a required citation. Guarded
        by the `x-admin-token` header matching the LORE_ADMIN_TOKEN env var;
        returns 503 when the admin token is not configured.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualSpinRequest"
      responses:
        "201":
          description: The spin was logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualSpinResponse"
        "400":
          description: Invalid manual spin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Credit:
      type: object
      properties:
        role:
          type: string
        name:
          type: string
        artistId:
          type: ["string", "null"]
      required:
        - role
        - name
    DiscogsPressing:
      type: object
      properties:
        label:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        country:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
    SongRelationship:
      type: object
      description: >-
        A typed, directional song-to-song relationship parsed from MusicBrainz.
        direction="forward" means THIS song is the source (it samples / is a
        cover of / is a remix of / interpolates the target); "backward" means the
        related entity does so to THIS song. The web graph renders each as a
        typed edge to a node identified by targetType + targetId.
      properties:
        kind:
          type: string
          enum: [sample, cover, remix, interpolation]
        direction:
          type: string
          enum: [forward, backward]
        label:
          type: string
        title:
          type: string
        artist:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        targetType:
          type: string
          enum: [recording, work]
        targetId:
          type: string
        mbUrl:
          type: string
      required:
        - kind
        - direction
        - label
        - title
        - targetType
        - targetId
        - mbUrl
    TrackKnowledge:
      type: object
      properties:
        recordingId:
          type: ["string", "null"]
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        personnel:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        pressing:
          anyOf:
            - $ref: "#/components/schemas/DiscogsPressing"
            - type: "null"
        relationships:
          type: array
          items:
            $ref: "#/components/schemas/SongRelationship"
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - personnel
        - approximate
        - fetchedAtMs
    TrackContext:
      type: object
      properties:
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        similarArtists:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        wikipediaUrl:
          type: ["string", "null"]
        geniusUrl:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - tags
        - similarArtists
        - approximate
        - fetchedAtMs
    CatalogueTrack:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        title:
          type: string
      required:
        - id
        - uri
        - title
    CatalogueAlbum:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        year:
          type: ["integer", "null"]
        url:
          type: string
      required:
        - id
        - name
        - url
    ArtistCatalogue:
      type: object
      properties:
        artistId:
          type: string
        artistName:
          type: string
        artistUrl:
          type: string
        topTracks:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueTrack"
        albums:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueAlbum"
      required:
        - artistId
        - artistName
        - artistUrl
        - topTracks
        - albums
    TrackLink:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
      required:
        - name
        - url
    TrackLinks:
      type: object
      properties:
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/TrackLink"
        pageUrl:
          type: ["string", "null"]
        fetchedAtMs:
          type: number
      required:
        - platforms
        - fetchedAtMs
    TrackInsight:
      type: object
      properties:
        positionMs:
          type: number
        text:
          type: string
      required:
        - positionMs
        - text
    ResolvedSong:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        artists:
          type: array
          items:
            type: string
        album:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        spotifyUrl:
          type: string
        isrc:
          type: ["string", "null"]
          description: International Standard Recording Code, when Spotify exposes it. The canonical identifier for sample-clearance requests.
        oEmbedHtml:
          type: ["string", "null"]
      required:
        - id
        - name
        - artists
        - spotifyUrl
    SongContext:
      type: object
      properties:
        track:
          $ref: "#/components/schemas/ResolvedSong"
        knowledge:
          anyOf:
            - $ref: "#/components/schemas/TrackKnowledge"
            - type: "null"
        context:
          anyOf:
            - $ref: "#/components/schemas/TrackContext"
            - type: "null"
        catalogue:
          anyOf:
            - $ref: "#/components/schemas/ArtistCatalogue"
            - type: "null"
        links:
          anyOf:
            - $ref: "#/components/schemas/TrackLinks"
            - type: "null"
        insights:
          type: array
          items:
            $ref: "#/components/schemas/TrackInsight"
      required:
        - track
        - insights
    OEmbed:
      type: object
      properties:
        html:
          type: string
        title:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        provider_name:
          type: ["string", "null"]
      required:
        - html
    Station:
      type: object
      description: A curated radio station in the public directory.
      properties:
        slug:
          type: string
        name:
          type: string
        org:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        streamUrl:
          type: string
        streamQuality:
          type: ["string", "null"]
        streamFormat:
          type: string
          description: Playback hint — "aac", "mp3", "hls", or "flac".
        mode:
          type: string
        homepageUrl:
          type: ["string", "null"]
        donateUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        attribution:
          type: boolean
      required:
        - slug
        - name
        - streamUrl
        - streamFormat
        - mode
        - attribution
    StationList:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/Station"
      required:
        - stations
    RecordingLink:
      type: object
      description: >-
        A cross-service deep link. kind="exact" points at the precise recording
        (resolved via Odesli); kind="search" is a best-effort artist+title search
        on that service.
      properties:
        name:
          type: string
        url:
          type: string
        kind:
          type: string
          enum: [exact, search]
      required:
        - name
        - url
        - kind
    NowPlayingRecording:
      type: object
      description: The MBID-keyed recording a spin resolved to.
      properties:
        mbid:
          type: string
        title:
          type: string
        artist:
          type: string
        artworkUrl:
          type: ["string", "null"]
        links:
          type: array
          items:
            $ref: "#/components/schemas/RecordingLink"
      required:
        - mbid
        - title
        - artist
        - links
    NowPlaying:
      type: object
      description: >-
        The most recent spin on a station. `recording` is null when the track
        could not be resolved to the MusicBrainz spine (raw metadata preserved).
      properties:
        rawArtist:
          type: string
        rawTitle:
          type: string
        source:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
        playedAt:
          type: string
        artworkUrl:
          type: ["string", "null"]
        recording:
          anyOf:
            - $ref: "#/components/schemas/NowPlayingRecording"
            - type: "null"
      required:
        - rawArtist
        - rawTitle
        - confidence
        - playedAt
    StationNowPlaying:
      type: object
      properties:
        station:
          $ref: "#/components/schemas/Station"
        nowPlaying:
          anyOf:
            - $ref: "#/components/schemas/NowPlaying"
            - type: "null"
      required:
        - station
    StationRef:
      type: object
      description: A station reference used in spin/segue attribution.
      properties:
        slug:
          type: string
        name:
          type: string
        stationClass:
          type: string
      required:
        - slug
        - name
        - stationClass
    ShowRef:
      type: object
      description: Show + DJ attribution for a spin, when the source exposes it.
      properties:
        name:
          type: string
        djName:
          type: ["string", "null"]
      required:
        - name
    RecordingSpin:
      type: object
      description: One logged play of a recording, with station + show attribution.
      properties:
        playedAt:
          type: string
        source:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
        station:
          $ref: "#/components/schemas/StationRef"
        show:
          anyOf:
            - $ref: "#/components/schemas/ShowRef"
            - type: "null"
      required:
        - playedAt
        - confidence
        - station
    RecordingSpins:
      type: object
      properties:
        mbid:
          type: string
        spins:
          type: array
          items:
            $ref: "#/components/schemas/RecordingSpin"
      required:
        - mbid
        - spins
    SegueNext:
      type: object
      description: A song observed playing after the queried recording.
      properties:
        mbid:
          type: string
        title:
          type: string
        artist:
          type: string
        artworkUrl:
          type: ["string", "null"]
        count:
          type: integer
        score:
          type: number
        stations:
          type: array
          items:
            $ref: "#/components/schemas/StationRef"
      required:
        - mbid
        - title
        - artist
        - count
        - score
        - stations
    SegueNextList:
      type: object
      properties:
        mbid:
          type: string
        next:
          type: array
          items:
            $ref: "#/components/schemas/SegueNext"
      required:
        - mbid
        - next
    ManualSpinRequest:
      type: object
      description: Admin manual/historical spin entry.
      properties:
        stationSlug:
          type: string
          minLength: 1
        artist:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        citation:
          type: string
          minLength: 1
        playedAt:
          type: string
          description: ISO timestamp; defaults to now when omitted.
        showName:
          type: string
        djName:
          type: string
        durationMs:
          type: integer
      required:
        - stationSlug
        - artist
        - title
        - citation
    ManualSpinResponse:
      type: object
      properties:
        logged:
          type: boolean
        mbid:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
      required:
        - logged
        - confidence
