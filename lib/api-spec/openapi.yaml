        pickers:
          type: array
          items:
            $ref: "#/components/schemas/Picker"
      required:
        - pickers
    EntryPick:
      type: object
      description: One attributed pick surfaced by the entry-flow ladder.
      properties:
        source:
          type: string
        pickerType:
          type: string
        pickerName:
          type: string
        pickerHandle:
          type: string
        trustTier:
          type: integer
        mbid:
          type: ["string", "null"]
        artistMbid:
          type: ["string", "null"]
        context:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        confidence:
          type: string
        pickedAt:
          type: ["string", "null"]
      required:
        - source
        - pickerType
        - pickerName
        - pickerHandle
        - trustTier
        - confidence
    EntryInvitation:
      type: object
      description: The "be the first" invitation returned on the empty rung.
      properties:
        message:
          type: string
        seedSource:
          type: string
          enum: [user_seed]
      required:
        - message
        - seedSource
    EntryResult:
      type: object
      description: The strongest rung of human attribution found for a recording.
      properties:
        rung:
          type: string
          enum: [dj, label, blog, curator, collector, event, series, artist, scene, empty]
        framing:
          type: string
        picks:
          type: array
          items:
            $ref: "#/components/schemas/EntryPick"
        invitation:
          anyOf:
            - $ref: "#/components/schemas/EntryInvitation"
            - type: "null"
      required:
        - rung
        - framing
        - picks
    UpsertPickerRequest:
      type: object
      description: Admin create/update of a picker, idempotent by handle.
      properties:
        pickerType:
          type: string
          enum: [dj, label, blog, curator, collector, event, series, editorial]
        name:
          type: string
          minLength: 1
        handle:
          type: string
        homeUrl:
          type: string
        trustTier:
          type: integer
        description:
          type: string
      required:
        - pickerType
        - name
    TrackEntry:
      type: object
      description: One entry in an admin-supplied tracklist.
      properties:
        artist:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        recordingId:
          type: string
        isrc:
          type: string
        sourceUrl:
          type: string
        context:
          type: string
        externalId:
          type: string
      required:
        - artist
        - title
    TracklistRequest:
      type: object
      description: A curator list or event lineup logged against a picker.
      properties:
        source:
          type: string
          enum: [curator_list, event_lineup, user_seed]
        ordered:
          type: boolean
          description: When true, entries form rideable edges via an ordinal.
        sourceUrl:
          type: string
        context:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TrackEntry"
      required:
        - source
        - entries
    TracklistResult:
      type: object
      properties:
        logged:
          type: integer
        resolved:
          type: integer
        total:
          type: integer
      required:
        - logged
        - resolved
        - total
    LabelSeedRequest:
      type: object
      description: Seed a label picker from a MusicBrainz label MBID.
      properties:
        labelMbid:
          type: string
          minLength: 1
        name:
          type: string
        homeUrl:
          type: string
      required:
        - labelMbid
    BlogIngestRequest:
      type: object
      description: Ingest a blog/critic RSS feed as a picker.
      properties:
        feedUrl:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        homeUrl:
          type: string
      required:
        - feedUrl
        - name
    DiscogsListRequest:
      type: object
      description: Ingest a public Discogs list as a collector picker.
      properties:
        listId:
          type: string
          minLength: 1
        name:
          type: string
      required:
        - listId
    RymListRequest:
      type: object
      description: Register a RateYourMusic list as a link-out-only picker.
      properties:
        name:
          type: string
          minLength: 1
        url:
          type: string
          minLength: 1
      required:
        - name
        - url
    IngestResult:
      type: object
      description: Summary of a worker ingest run.
      properties:
        pickerId:
          type: integer
        handle:
          type: string
        name:
          type: string
        found:
          type: ["integer", "null"]
        matched:
          type: ["integer", "null"]
        logged:
          type: integer
      required:
        - pickerId
        - handle
        - name
        - logged
    SpotifyStatus:
      type: object
      description: >
        Spotify Connect status for this browser session. When `configured` is
        false the feature is honestly absent (server has no app credentials).
      properties:
        configured:
          type: boolean
        connected:
          type: boolean
        displayName:
          type: ["string", "null"]
        product:
          type: ["string", "null"]
          description: Spotify product tier ("premium", "free", ...).
      required:
        - configured
        - connected
    SpotifyPlayRequest:
      type: object
      properties:
        mbid:
          type: string
          minLength: 1
      required:
        - mbid
    SpotifyPlayResult:
      type: object
      description: Full-track playback started on the listener's own device.
      properties:
        trackUri:
          type: string
        trackUrl:
          type: ["string", "null"]
        matchSource:
          type: string
          enum: [link, isrc, search]
          description: >
            How the MBID was matched to Spotify — exact stored link, ISRC
            lookup, or best-effort artist+title search (honest gradient).
        deviceName:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
      required:
        - trackUri
        - matchSource
    SpotifySaveResult:
      type: object
      description: Liked Songs state for a resolved track.
      properties:
        saved:
          type: boolean
      required:
        - saved
    SpotifyPlayerState:
      type: object
      description: >
        Snapshot of the listener's Spotify player (Connect API). `active` is
        false when Spotify reports no playback session anywhere.
      properties:
        active:
          type: boolean
        isPlaying:
          type: boolean
        progressMs:
          type: ["integer", "null"]
        durationMs:
          type: ["integer", "null"]
        trackUri:
          type: ["string", "null"]
      required:
        - active
        - isPlaying
    SongExploderClaimRequest:
      type: object
      description: >
        Admin-entered, paraphrased claim attached to a Song Exploder episode's
        resolved recording. Never verbatim transcript — always a paraphrase with
        a deep link to the supporting moment in the episode.
      properties:
        offsetMs:
          type: ["integer", "null"]
          description: >
            Millisecond offset within the song where this fact applies.
            Null or omitted = track-level fact (shown in liner notes without
            a timeline anchor).
        text:
          type: string
          minLength: 1
          description: Paraphrased claim text (never verbatim transcript prose).
        sourceUrl:
          type: string
          minLength: 1
          description: >
            Deep link to the episode (or a timestamped link to the exact
            moment if the podcast player supports it), so every claim is
            one tap from its evidence.
      required:
        - text
        - sourceUrl
    SongExploderClaimResponse:
      type: object
      properties:
        claimId:
          type: integer
          description: The track_claims row id of the stored claim.
        mbid:
          type: string
          description: The MusicBrainz Recording ID the claim is attached to.
        episodeTitle:
          type: string
          description: The raw episode title from the Song Exploder feed.
      required:
        - claimId
        - mbid
        - episodeTitle
