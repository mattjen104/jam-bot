      properties:
        name:
          type: string
        handle:
          type: string
        pickerType:
          type: string
        trustTier:
          type: integer
      required:
        - name
        - handle
        - pickerType
        - trustTier
    SegueNextList:
      type: object
      properties:
        mbid:
          type: string
        next:
          type: array
          items:
