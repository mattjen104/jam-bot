openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: song
    description: Song-context enrichment (graph + dossier)
  - name: stations
    description: Lore — curated radio stations + now-playing resolution
  - name: spotify
    description: >
      Lore — Spotify Connect. Remote-controls the LISTENER'S OWN Spotify app
      via the Web API (no SDK, no audio proxying) so rides can play full
      tracks. Identity is an opaque httpOnly session cookie; browser-navigation
      OAuth endpoints (/spotify/login, /spotify/callback) are deliberately not
      in this spec — they are redirects, not JSON APIs.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /song/resolve:
    get:
      operationId: resolveSong
      tags: [song]
      summary: Resolve free-text to a Spotify track
      description: >
        Resolves a free-text query (e.g. "kashmir led zeppelin") to a single
        best-match Spotify track, including the public Spotify oEmbed embed HTML
        for the anchor player node.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Resolved track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedSong"
        "404":
          description: No match found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Spotify not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/{trackId}/context:
    get:
      operationId: getSongContext
      tags: [song]
      summary: Consolidated song-context dossier
      description: >
        Returns the same enrichment the jam-bot Slack track card serves —
        credits/pressing (knowledge), genre/era/bio/links (context), the
        artist's playable catalogue, cross-platform links, and timed insights.
        Every section degrades to null/empty when its source is unconfigured or
        has no data.
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Song context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongContext"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /song/oembed:
    get:
      operationId: getOembed
      tags: [song]
      summary: Spotify oEmbed passthrough
      description: >
        Public Spotify oEmbed passthrough for an open.spotify.com URL. Requires
        no Spotify credentials.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: oEmbed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OEmbed"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /stations:
    get:
      operationId: listStations
      tags: [stations]
      summary: List curated radio stations
      description: >
        The public directory of curated, high-quality radio stations. Each
        station carries its own sanctioned live stream URL (played unmodified),
        a quality badge, and attribution links (homepage + donate).
      responses:
        "200":
          description: Station directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationList"
  /stations/now-playing:
    get:
      operationId: listStationsNowPlaying
      tags: [stations]
      summary: Current track on every station, in one call (dial pulse)
      description: >
        The latest logged spin for each station in the directory — artwork,
        raw title/artist, best-effort recording resolution, and show/DJ
        attribution when the source exposes it. Powers the dial's live album
        covers. Stations with nothing logged yet return a null `nowPlaying`.
      responses:
        "200":
          description: Latest spin per station
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationPulseList"
  /stations/{slug}/now-playing:
    get:
      operationId: getStationNowPlaying
      tags: [stations]
      summary: Current track on a station, resolved to the MBID spine
      description: >
        The most recent spin logged for a station, resolved (best-effort) to a
        MusicBrainz Recording ID with cross-service deep links and artwork. The
        `nowPlaying` field is null when nothing has been logged yet.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Station with its current now-playing track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationNowPlaying"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}:
    get:
      operationId: getRecording
      tags: [recordings]
      summary: A recording's own metadata (song-page header)
      description: >
        The MBID-keyed recording node — title, artist, artwork and cross-service
        deep links — for rendering a shareable song page. 404 when the MBID is
        not (yet) on the spine.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingNode"
        "404":
          description: Recording not on the spine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}/knowledge:
    get:
      operationId: getRecordingKnowledge
      tags: [recordings]
      summary: Liner-notes knowledge for a recording (credits, pressing)
      description: >
        Real liner-notes enrichment for a recording on the spine — personnel
        credits, original pressing detail, and typed song relationships —
        resolved from MusicBrainz/Discogs and cached. `knowledge` is null when
        the sources are unconfigured or nothing verifiable was found; Lore
        never fabricates credits.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording's liner-notes knowledge (or null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingKnowledge"
        "404":
          description: Recording not on the spine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}/spins:
    get:
      operationId: getRecordingSpins
      tags: [recordings]
      summary: Where a recording has been played, with attribution
      description: >
        Every logged spin of a recording (newest first), each attributed to the
        station and — when the source exposes it — the show and DJ. This is the
        play-history surface for a track page.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording's spins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingSpins"
  /recordings/{mbid}/picks:
    get:
      operationId: getRecordingPicks
      tags: [recordings]
      summary: Curated lists that contain a recording ("Picked by")
      description: >
        Every curated pick of this recording — the reverse edge of the
        song–source graph. Each pick carries its picker, the specific list/run
        it belongs to (runId, when the pick has a source URL), its ordinal
        within that list, and the run's size, so a song page can link both to
        the picker and to the exact list, and offer "hear it in context"
        playback. Only real human selection edges — never inferred.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording's curated picks (empty when none)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingPicks"
  /recordings/{mbid}/preview:
    get:
      operationId: getRecordingPreview
      tags: [recordings]
      summary: A 30-second preview clip for a recording (for riding)
      description: >
        Best-effort 30s preview resolved via the public iTunes Search API and
        streamed directly from Apple's CDN to the client (Lore never hosts or
        proxies the audio bytes). previewUrl is null when none was found; the UI
        then degrades to deep links.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The recording's preview (fields may be null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingPreview"
        "404":
          description: Recording not on the spine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}/segues:
    get:
      operationId: getRecordingSegues
      tags: [recordings]
      summary: Songs observed playing next (Segue mode)
      description: >
        Real DJ transitions observed after this recording, ranked by a
        station-class-weighted frequency so curated/community segues outrank
        commercial ones. Powers Segue mode.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Ranked next-song candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegueNextList"
  /admin/spins:
    post:
      operationId: createManualSpin
      tags: [admin]
      summary: Admin-only manual/historical spin entry
      description: >
        Log a spin by hand for historical reconstruction, resolved to the MBID
        spine and stored with source="manual" and a required citation. Guarded
        by the `x-admin-token` header matching the LORE_ADMIN_TOKEN env var;
        returns 503 when the admin token is not configured.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualSpinRequest"
      responses:
        "201":
          description: The spin was logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualSpinResponse"
        "400":
          description: Invalid manual spin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pickers:
    get:
      operationId: listPickers
      tags: [pickers]
      summary: All active pickers (labels, blogs, curators, collectors, events)
      description: >
        The trusted taste sources Lore rides beyond radio DJs. A DJ is one
        picker type; this lists the rest (and any DJ-typed pickers), so a client
        can browse who is doing the picking. Filter by pickerType with the
        optional `type` query parameter.
      parameters:
        - name: type
          in: query
          required: false
          description: Filter to a specific pickerType (e.g. "editorial").
          schema:
            type: string
      responses:
        "200":
          description: The active pickers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickerList"
  /stations/{slug}/archive:
    get:
      operationId: getStationArchive
      tags: [archive]
      summary: A station's documented runs (ghost radio browse surface)
      description: >
        The station's play history grouped into runs — one run per show per UTC
        broadcast day — newest first. Each run is a real, documented sequence a
        DJ actually aired; the `runId` is an opaque id for fetching the full
        tracklist via /archive/station-runs/{runId}.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The station's archived runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationArchive"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /archive/station-runs/{runId}:
    get:
      operationId: getStationRun
      tags: [archive]
      summary: One archived station run, in airing order
      description: >
        The full tracklist of one documented station run (a show's UTC broadcast
        day), oldest first — exactly as it aired. Tracks resolved to the spine
        carry their recording node; unresolved tracks keep raw metadata so the
        honesty gradient stays visible.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The run with its ordered tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationRunDetail"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pickers/{handle}/archive:
    get:
      operationId: getPickerArchive
      tags: [archive]
      summary: A picker's documented runs (archived episodes / lists)
      description: >
        The picker's picks grouped into runs — one run per source URL (an NTS
        episode page, a list, a post) — newest first by pick date. The `runId`
        is an opaque id for fetching the ordered tracklist via
        /archive/picker-runs/{runId}.
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The picker's archived runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickerArchive"
        "404":
          description: Picker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /archive/picker-runs/{runId}:
    get:
      operationId: getPickerRun
      tags: [archive]
      summary: One archived picker run, in documented order
      description: >
        The ordered tracklist of one picker run (an archived episode or list),
        in the order the picker documented it. Ordinals are preserved; tracks
        resolved to the spine carry their recording node.
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The run with its ordered tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickerRunDetail"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /archive/coverage:
    get:
      operationId: getArchiveCoverage
      tags: [archive]
      summary: How deep the ghost radio archive goes, per source
      description: >
        Observability for the archive: per-station depth (oldest documented
        spin, backfill progress) and per-picker run counts, each with resolved
        vs. total track counts so "how good is ghost radio" is answerable at
        a glance.
      responses:
        "200":
          description: Per-source archive depth and resolution quality
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveCoverage"
  /archive/recent-runs:
    get:
      operationId: getArchiveRecentRuns
      tags: [archive]
      summary: Recent documented runs across every station (ghost radio browse)
      description: >
        The newest documented runs from all stations in one list — each a real
        show's plays on one UTC broadcast day. Ranked by recency and quality:
        newest broadcast day first, best-resolved runs first within a day, so
        replayable runs lead. Powers the home screen's Ghost Radio mode.
      responses:
        "200":
          description: Recent runs across all stations, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveRecentRuns"
  /stations/{slug}/overlaps/pickers:
    get:
      operationId: getStationPickerOverlaps
      tags: [archive]
      summary: Curated pickers sharing tracks with a station ("Critics agree")
      description: >
        Pickers whose curated lists contain recordings this station has
        actually spun — exact MBID overlap only, never similarity. Ranked by
        the number of distinct shared recordings. Empty when no picker shares
        a track with the station's spin history.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Pickers overlapping this station's spin history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationPickerOverlaps"
        "404":
          description: Station not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pickers/{handle}/overlaps/stations:
    get:
      operationId: getPickerStationOverlaps
      tags: [archive]
      summary: Stations that have spun a picker's tracks ("On the radio too")
      description: >
        Stations whose logged spin history contains recordings this picker has
        picked — exact MBID overlap only, never similarity. Ranked by the
        number of distinct shared recordings. Empty when radio hasn't touched
        any of the picker's tracks.
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Stations overlapping this picker's picks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickerStationOverlaps"
        "404":
          description: Picker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /picks/contains:
    get:
      operationId: lookupPickedMbids
      tags: [pickers]
      summary: Which of these MBIDs appear in an editorial list (dial badges)
      description: >
        Batched, cached lookup for the live dial: given a comma-separated list
        of recording MBIDs, returns — for each MBID that appears in at least
        one curated (non-DJ) picker's list — the strongest such pick with its
        picker and list runId. MBIDs with no editorial pick are simply absent.
        Served from an in-memory cache so it never slows the dial poll.
      parameters:
        - name: mbids
          in: query
          required: true
          description: Comma-separated recording MBIDs (max 30 per call).
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Editorial-list hits for the requested MBIDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickedLookup"
  /recordings/{mbid}/lyrics:
    get:
      operationId: getRecordingLyrics
      tags: [recordings]
      summary: Synced lyric lines for a recording (LRCLIB)
      description: >
        Returns time-indexed lyric lines from LRCLIB. Each line carries an
        offset_ms so the UI can highlight the active cue during playback.
        Returns an empty lines array when LRCLIB has no synced version.
        Fetched and cached on first request — subsequent calls are instant.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Synced lyric lines (empty when unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingLyrics"
        "404":
          description: Recording not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /recordings/{mbid}/entry:
    get:
      operationId: getRecordingEntry
      tags: [recordings]
      summary: Strongest human attribution for a track (entry-flow ladder)
      description: >
        Source-agnostic fallback ladder. Returns the strongest available human
        attribution for a recording — DJ spin, then label, then blog/curator,
        then collector/event, then artist-level — and stops there. Lore never
        falls through to algorithmic similar-tracks: when no human has picked the
        track it returns an empty rung with a "be the first" invitation.
      parameters:
        - name: mbid
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: The strongest rung of attribution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryResult"
  /admin/pickers:
    post:
      operationId: upsertPicker
      tags: [admin]
      summary: Admin-only create/update of a picker
      description: >
        Create or update a picker (label, blog, curator, collector, event),
        idempotent by handle. Guarded by the `x-admin-token` header matching the
        LORE_ADMIN_TOKEN env var; returns 503 when unconfigured.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPickerRequest"
      responses:
        "201":
          description: The picker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Picker"
        "400":
          description: Invalid picker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/pickers/{handle}/picks:
    post:
      operationId: logTracklist
      tags: [admin]
      summary: Admin-only tracklist ingest for a picker (curator lists, lineups)
      description: >
        Log a whole tracklist against an existing picker — the generic write path
        behind curator lists and event lineups. Ordered lists form rideable
        edges; unordered lists are ridden as a set. Every entry is logged even
        when it resolves only approximately. Token-guarded.
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TracklistRequest"
      responses:
        "201":
          description: Ingest summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracklistResult"
        "400":
          description: Invalid tracklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Picker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/labels:
    post:
      operationId: seedLabel
      tags: [admin]
      summary: Admin-only label seed by MusicBrainz MBID
      description: >
        Create a label picker and log a pick for every recording MusicBrainz
        reports on the label's releases (recording-id confidence, no text
        resolution). One MusicBrainz request, honoring the 1 req/sec budget.
        Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabelSeedRequest"
      responses:
        "201":
          description: Ingest summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/blogs:
    post:
      operationId: ingestBlog
      tags: [admin]
      summary: Admin-only blog/critic RSS ingest
      description: >
        Poll a tastemaker RSS/Atom feed and log a pick per post that yields a
        confident artist/track match. Only the resolved pick and a link to the
        exact post are stored — never the post body. Posts with no confident
        match are skipped. Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogIngestRequest"
      responses:
        "201":
          description: Ingest summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/discogs-lists:
    post:
      operationId: ingestDiscogsList
      tags: [admin]
      summary: Admin-only Discogs list ingest (collector)
      description: >
        Ingest a public Discogs list via the Discogs API and log a pick per
        catalogued item, resolving "Artist - Title" where possible and logging
        unresolved otherwise. Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscogsListRequest"
      responses:
        "201":
          description: Ingest summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/rym-lists:
    post:
      operationId: addRymList
      tags: [admin]
      summary: Admin-only RateYourMusic link-out picker
      description: >
        Register a RateYourMusic list as a link-out-only picker. RYM forbids
        scraping, so no items are ingested — only the picker and its home link
        are stored, so the entry flow can point listeners at it without touching
        RYM. Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RymListRequest"
      responses:
        "201":
          description: The picker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Picker"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/song-exploder/{episodeId}/claims:
    post:
      operationId: addSongExploderClaim
      tags: [admin]
      summary: Admin-only timestamp-anchored claim entry for a Song Exploder episode
      description: >
        Attach a paraphrased, timestamp-anchored claim to the recording
        resolved from a Song Exploder episode. Claims are admin-entered (never
        automated) because Song Exploder episode timestamps live in the audio,
        not the RSS feed text. The claim is stored as a track_claim with
        source attribution deep-linking to the episode, so every fact is one
        tap from its evidence. Token-guarded.
      parameters:
        - name: episodeId
          in: path
          required: true
          schema:
            type: integer
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongExploderClaimRequest"
      responses:
        "201":
          description: The claim was stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongExploderClaimResponse"
        "400":
          description: Invalid claim body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Episode not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Episode not yet resolved to a recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/wikipedia-drafts:
    get:
      operationId: getWikipediaDrafts
      tags: [admin]
      summary: Pending Wikipedia section draft claims for a recording
      description: >
        Returns all draft track claims with source_handle='wikipedia' for the
        given recording MBID. The admin reads the linked Wikipedia section, then
        uses PATCH /admin/claims/:id to paraphrase and publish or reject each
        draft. Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
        - name: mbid
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Pending draft claims for this recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikipediaDraftList"
        "400":
          description: Missing mbid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/genius-drafts:
    get:
      operationId: listGeniusDrafts
      tags: [admin]
      summary: Admin-only list of pending Genius annotation drafts for a recording
      description: >
        Returns all Genius annotation drafts in 'draft' status for a given
        recording MBID. Each draft carries the lyric fragment, projected
        timestamp anchor (when a matching LRCLIB line was found), Genius deep
        link, verified flag, and vote count. Admin reviews these and calls
        `/admin/genius-drafts/{id}/review` to publish or reject. Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
        - name: mbid
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Pending drafts for the recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeniusDraftList"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/claims/{id}:
    patch:
      operationId: patchClaim
      tags: [admin]
      summary: Admin review — paraphrase and publish or reject a draft claim
      description: >
        Set the status of a draft track claim to 'published' or 'rejected'. When
        publishing, `text` is required and must be the admin-written paraphrase
        of the Wikipedia section's key fact — never verbatim Wikipedia prose.
        Token-guarded.
      parameters:
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchClaimRequest"
      responses:
        "200":
          description: The updated claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikipediaDraftClaim"
        "400":
          description: Invalid request (e.g. missing text when publishing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Claim not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/genius-drafts/{id}/review:
    post:
      operationId: reviewGeniusDraft
      tags: [admin]
      summary: Admin-only publish or reject a Genius annotation draft
      description: >
        Publish or reject a pending Genius annotation draft. On publish,
        the admin supplies a paraphrase (`text` field) — never the verbatim
        Genius annotation — which is stored as a `track_claim` with
        `source_label = "Genius"` (or `"Genius · Verified"` for artist-verified
        annotations). The claim inherits the draft's `offset_ms` as
        `position_ms` when `anchor_type = 'timestamp'`. Token-guarded.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: x-admin-token
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeniusDraftReviewRequest"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeniusDraftReviewResponse"
        "400":
          description: Invalid request or draft not in reviewable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Draft not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Admin entry not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/status:
    get:
      operationId: getSpotifyStatus
      tags: [spotify]
      summary: Whether this browser session has Spotify connected
      description: >
        `configured` is false when the server has no Spotify app credentials
        (feature honestly absent). `connected` is true when this session's
        cookie maps to stored OAuth tokens.
      responses:
        "200":
          description: Connection status for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyStatus"
  /spotify/logout:
    post:
      operationId: spotifyLogout
      tags: [spotify]
      summary: Disconnect Spotify (delete stored tokens, clear cookie)
      responses:
        "204":
          description: Disconnected (idempotent)
  /spotify/play:
    post:
      operationId: spotifyPlay
      tags: [spotify]
      summary: Play a recording (full track) on the listener's own Spotify
      description: >
        Resolves the MBID to a Spotify track (exact link > ISRC > artist+title
        search) and starts playback on the listener's active Spotify device via
        the Connect API. Requires Premium and an open Spotify app somewhere.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyPlayRequest"
      responses:
        "200":
          description: Playback started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyPlayResult"
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Spotify Premium required for remote playback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Recording unknown or not found on Spotify
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No active Spotify device (open Spotify on any device)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Spotify not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/pause:
    post:
      operationId: spotifyPause
      tags: [spotify]
      summary: Pause the listener's Spotify playback
      responses:
        "204":
          description: Paused (idempotent; also 204 when nothing was playing)
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/resume:
    post:
      operationId: spotifyResume
      tags: [spotify]
      summary: Resume the listener's Spotify playback
      responses:
        "204":
          description: Resumed
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No active Spotify device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/save:
    post:
      operationId: spotifySave
      tags: [spotify]
      summary: Save a recording to the listener's Spotify Liked Songs
      description: >
        Resolves the MBID to a Spotify track (exact link > ISRC > artist+title
        search) and saves it to the listener's library. Works on any Spotify
        tier (no Premium requirement). A 403 with code `insufficient_scope`
        means the connection predates library access — reconnect to grant it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyPlayRequest"
      responses:
        "200":
          description: Track saved to Liked Songs (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifySaveResult"
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Connection lacks library scope — reconnect required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Recording unknown or not found on Spotify
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Spotify library request failed upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Spotify not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/saved:
    get:
      operationId: getSpotifySaved
      tags: [spotify]
      summary: Whether a recording is already in the listener's Liked Songs
      parameters:
        - name: mbid
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Saved state for the resolved Spotify track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifySaveResult"
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Connection lacks library scope — reconnect required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Recording unknown or not found on Spotify
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Spotify library request failed upstream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /spotify/player:
    get:
      operationId: getSpotifyPlayer
      tags: [spotify]
      summary: Snapshot of the listener's Spotify player state
      description: >
        Polled by the ride player to detect track end (auto-advance). `active`
        is false when Spotify reports no active playback session.
      responses:
        "200":
          description: Player state snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyPlayerState"
        "401":
          description: No Spotify connection for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Credit:
      type: object
      properties:
        role:
          type: string
        name:
          type: string
        artistId:
          type: ["string", "null"]
      required:
        - role
        - name
    DiscogsPressing:
      type: object
      properties:
        label:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        country:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
    SongRelationship:
      type: object
      description: >-
        A typed, directional song-to-song relationship parsed from MusicBrainz.
        direction="forward" means THIS song is the source (it samples / is a
        cover of / is a remix of / interpolates the target); "backward" means the
        related entity does so to THIS song. The web graph renders each as a
        typed edge to a node identified by targetType + targetId.
      properties:
        kind:
          type: string
          enum: [sample, cover, remix, interpolation]
        direction:
          type: string
          enum: [forward, backward]
        label:
          type: string
        title:
          type: string
        artist:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        targetType:
          type: string
          enum: [recording, work]
        targetId:
          type: string
        mbUrl:
          type: string
      required:
        - kind
        - direction
        - label
        - title
        - targetType
        - targetId
        - mbUrl
    TrackKnowledge:
      type: object
      properties:
        recordingId:
          type: ["string", "null"]
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        personnel:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        pressing:
          anyOf:
            - $ref: "#/components/schemas/DiscogsPressing"
            - type: "null"
        relationships:
          type: array
          items:
            $ref: "#/components/schemas/SongRelationship"
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - personnel
        - approximate
        - fetchedAtMs
    TrackContext:
      type: object
      properties:
        artistId:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        similarArtists:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        wikipediaUrl:
          type: ["string", "null"]
        geniusUrl:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        approximate:
          type: boolean
        fetchedAtMs:
          type: number
      required:
        - tags
        - similarArtists
        - approximate
        - fetchedAtMs
    CatalogueTrack:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        title:
          type: string
      required:
        - id
        - uri
        - title
    CatalogueAlbum:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        year:
          type: ["integer", "null"]
        url:
          type: string
      required:
        - id
        - name
        - url
    ArtistCatalogue:
      type: object
      properties:
        artistId:
          type: string
        artistName:
          type: string
        artistUrl:
          type: string
        topTracks:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueTrack"
        albums:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueAlbum"
      required:
        - artistId
        - artistName
        - artistUrl
        - topTracks
        - albums
    TrackLink:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
      required:
        - name
        - url
    TrackLinks:
      type: object
      properties:
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/TrackLink"
        pageUrl:
          type: ["string", "null"]
        fetchedAtMs:
          type: number
      required:
        - platforms
        - fetchedAtMs
    TrackInsight:
      type: object
      properties:
        positionMs:
          type: number
        text:
          type: string
      required:
        - positionMs
        - text
    ResolvedSong:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        artists:
          type: array
          items:
            type: string
        album:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        spotifyUrl:
          type: string
        isrc:
          type: ["string", "null"]
          description: International Standard Recording Code, when Spotify exposes it. The canonical identifier for sample-clearance requests.
        oEmbedHtml:
          type: ["string", "null"]
      required:
        - id
        - name
        - artists
        - spotifyUrl
    SongContext:
      type: object
      properties:
        track:
          $ref: "#/components/schemas/ResolvedSong"
        knowledge:
          anyOf:
            - $ref: "#/components/schemas/TrackKnowledge"
            - type: "null"
        context:
          anyOf:
            - $ref: "#/components/schemas/TrackContext"
            - type: "null"
        catalogue:
          anyOf:
            - $ref: "#/components/schemas/ArtistCatalogue"
            - type: "null"
        links:
          anyOf:
            - $ref: "#/components/schemas/TrackLinks"
            - type: "null"
        insights:
          type: array
          items:
            $ref: "#/components/schemas/TrackInsight"
      required:
        - track
        - insights
    OEmbed:
      type: object
      properties:
        html:
          type: string
        title:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        provider_name:
          type: ["string", "null"]
      required:
        - html
    Station:
      type: object
      description: A curated radio station in the public directory.
      properties:
        slug:
          type: string
        name:
          type: string
        org:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        streamUrl:
          type: string
        streamQuality:
          type: ["string", "null"]
        streamFormat:
          type: string
          description: Playback hint — "aac", "mp3", "hls", or "flac".
        mode:
          type: string
        homepageUrl:
          type: ["string", "null"]
        donateUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        attribution:
          type: boolean
      required:
        - slug
        - name
        - streamUrl
        - streamFormat
        - mode
        - attribution
    StationList:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/Station"
      required:
        - stations
    RecordingLink:
      type: object
      description: >-
        A cross-service deep link. kind="exact" points at the precise recording
        (resolved via Odesli); kind="search" is a best-effort artist+title search
        on that service.
      properties:
        name:
          type: string
        url:
          type: string
        kind:
          type: string
          enum: [exact, search]
      required:
        - name
        - url
        - kind
    RecordingNode:
      type: object
      description: >-
        A recording's own metadata, keyed by MusicBrainz Recording ID, for the
        song page. artistMbid powers artist-level attribution; artwork and links
        are best-effort and may be absent.
      properties:
        mbid:
          type: string
        title:
          type: string
        artist:
          type: string
        artistMbid:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
        artworkUrl:
          type: ["string", "null"]
        links:
          type: array
          items:
            $ref: "#/components/schemas/RecordingLink"
      required:
        - mbid
        - title
        - artist
        - links
    RecordingPreview:
      type: object
      description: >-
        A best-effort 30s preview clip for a recording. All fields may be null
        when no preview was found; the audio streams directly from the source's
        CDN, never through Lore.
      properties:
        mbid:
          type: string
        previewUrl:
          type: ["string", "null"]
        artworkUrl:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
      required:
        - mbid
    NowPlayingRecording:
      type: object
      description: The MBID-keyed recording a spin resolved to.
      properties:
        mbid:
          type: string
        title:
          type: string
        artist:
          type: string
        artworkUrl:
          type: ["string", "null"]
        links:
          type: array
          items:
            $ref: "#/components/schemas/RecordingLink"
      required:
        - mbid
        - title
        - artist
        - links
    NowPlaying:
      type: object
      description: >-
        The most recent spin on a station. `recording` is null when the track
        could not be resolved to the MusicBrainz spine (raw metadata preserved).
      properties:
        rawArtist:
          type: string
        rawTitle:
          type: string
        source:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
        playedAt:
          type: string
        artworkUrl:
          type: ["string", "null"]
        recording:
          anyOf:
            - $ref: "#/components/schemas/NowPlayingRecording"
            - type: "null"
        show:
          description: Show + DJ on air for this spin, when the source exposes it.
          anyOf:
            - $ref: "#/components/schemas/ShowRef"
            - type: "null"
      required:
        - rawArtist
        - rawTitle
        - confidence
        - playedAt
    StationNowPlaying:
      type: object
      properties:
        station:
          $ref: "#/components/schemas/Station"
        nowPlaying:
          anyOf:
            - $ref: "#/components/schemas/NowPlaying"
            - type: "null"
      required:
        - station
    StationPulse:
      type: object
      description: One station's latest spin, for the dial's live pulse.
      properties:
        slug:
          type: string
        nowPlaying:
          anyOf:
            - $ref: "#/components/schemas/NowPlaying"
            - type: "null"
      required:
        - slug
    StationPulseList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StationPulse"
      required:
        - items
    LyricLine:
      type: object
      description: >
        One time-indexed lyric cue from a synced lyrics source (LRCLIB).
        offset_ms is the millisecond offset from the start of the recording.
      properties:
        offsetMs:
          type: integer
          description: Milliseconds from the start of the recording.
        text:
          type: string
          description: The lyric text for this cue.
      required:
        - offsetMs
        - text
    RecordingLyrics:
      type: object
      description: >
        Synced lyric lines for a recording. lines is empty when LRCLIB has no
        synced version for this track.
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LyricLine"
      required:
        - lines
    GeniusDraft:
      type: object
      description: >
        A pending Genius annotation draft awaiting admin review. The lyric
        fragment is stored for context (never surfaced verbatim as a claim).
        `anchorType = 'timestamp'` means `offsetMs` is set and the claim will
        be anchored to the matching lyric line on publish.
      properties:
        id:
          type: integer
        mbid:
          type: string
        geniusSongId:
          type: integer
        geniusAnnotationId:
          type: integer
        fragment:
          type: string
          description: The lyric fragment the annotation is anchored to.
        anchorType:
          type: string
          enum: [timestamp, none]
        offsetMs:
          anyOf:
            - type: integer
            - type: "null"
        geniusUrl:
          type: string
        verified:
          type: boolean
        voteCount:
          type: integer
        status:
          type: string
          enum: [draft, published, rejected]
      required:
        - id
        - mbid
        - geniusSongId
        - geniusAnnotationId
        - fragment
        - anchorType
        - geniusUrl
        - verified
        - voteCount
        - status
    GeniusDraftList:
      type: object
      properties:
        mbid:
          type: string
        drafts:
          type: array
          items:
            $ref: "#/components/schemas/GeniusDraft"
      required:
        - mbid
        - drafts
    GeniusDraftReviewRequest:
      type: object
      description: >
        Admin review action for a Genius annotation draft. `action = 'publish'`
        requires a non-empty `text` (the admin's paraphrase of the annotation).
        `action = 'reject'` requires no text.
      properties:
        action:
          type: string
          enum: [publish, reject]
        text:
          type: string
          description: >
            Admin-written paraphrase of the Genius annotation — required when
            action = 'publish'. Never the verbatim annotation text.
          minLength: 1
      required:
        - action
    GeniusDraftReviewResponse:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
          enum: [published, rejected]
        claimId:
          anyOf:
            - type: integer
            - type: "null"
          description: The new track_claim id when action = 'published'.
      required:
        - id
        - action
    TrackClaim:
      type: object
      description: >
        One grounded fact about a recording, extracted systematically from an
        official documentary source (e.g. a Classic Albums making-of clip, a
        Wikipedia article section, or a Genius annotation). `sourceUrl`
        deep-links to the supporting moment or section in the original source,
        so every claim is one tap from its evidence. `anchorType` distinguishes
        timestamp-anchored (null) from section-anchored ('section') claims.
        Section claims carry `anchorValue` (the Wikipedia section label, e.g.
        "Recording") and a `sourceUrl` that is a Wikipedia deep link to that
        section. `verified` is true for artist-verified Genius annotations.
        `sourceHandle` identifies the picker that produced this claim (e.g.
        "genius", "classic-albums") so UIs can apply source-specific treatment.
      properties:
        id:
          type: integer
          description: Database row id (needed for admin PATCH).
        text:
          type: string
        sourceLabel:
          type: string
        sourceUrl:
          type: string
        sourceHandle:
          type: string
          description: >
            Machine-readable source identifier, e.g. "genius" or
            "classic-albums". Use this to filter claims by source in the UI.
        positionMs:
          anyOf:
            - type: integer
            - type: "null"
        anchorType:
          anyOf:
            - type: string
              enum: ["section"]
            - type: "null"
          description: >
            'section' for Wikipedia section claims; null for timestamp-anchored
            claims (positionMs carries the offset).
        anchorValue:
          anyOf:
            - type: string
            - type: "null"
          description: >
            Section label when anchorType='section' (e.g. "Recording",
            "Production", "Composition", "Background",
            "Critical reception"). Null for timestamp-anchored claims.
        status:
          type: string
          enum: ["draft", "published", "rejected"]
          description: >
            Review status. Only 'published' claims are surfaced to end users
            on the song page. 'draft' = awaiting admin review (Wikipedia
            candidates). 'rejected' = discarded by admin.
        sourceHandle:
          type: string
          description: >
            Origin handle for the claim. 'classic-albums' for Classic Albums
            documentary clips. 'wikipedia' for track-level Wikipedia section
            claims. 'wikipedia-album' for album-level Wikipedia section claims
            (sourced from the recording's canonical album article).
            'genius' for Genius annotation-derived claims.
        verified:
          type: boolean
          description: True for artist-verified Genius annotations.
      required:
        - text
        - sourceLabel
        - sourceUrl
        - sourceHandle
    WikipediaDraftList:
      type: object
      properties:
        claims:
          type: array
          items:
            $ref: "#/components/schemas/WikipediaDraftClaim"
      required:
        - claims
    WikipediaDraftClaim:
      type: object
      description: >
        A Wikipedia draft track claim awaiting admin review. The admin fills in
        `text` (a paraphrase of the section's key fact) before publishing.
        No Wikipedia prose is stored — only the section URL pointer and the
        admin-written paraphrase.
      properties:
        id:
          type: integer
        mbid:
          type: string
        anchorValue:
          type: string
          description: Section label (e.g. "Recording", "Production").
        sourceLabel:
          type: string
          description: "Wikipedia article title, e.g. 'Wikipedia — Go Your Own Way'."
        sourceUrl:
          type: string
          description: Deep link to the Wikipedia section.
        status:
          type: string
          enum: ["draft", "published", "rejected"]
        createdAt:
          type: string
      required:
        - id
        - mbid
        - anchorValue
        - sourceLabel
        - sourceUrl
        - status
        - createdAt
    PatchClaimRequest:
      type: object
      description: >
        Admin claim review: provide the paraphrased claim text and set status
        to 'published' (to publish) or 'rejected' (to discard). Text is
        required when publishing — it must be the admin-written paraphrase of
        the Wikipedia section's key fact, never verbatim Wikipedia prose.
      properties:
        text:
          type: string
          minLength: 1
        status:
          type: string
          enum: ["published", "rejected"]
      required:
        - status
    RecordingKnowledge:
      type: object
      properties:
        knowledge:
          anyOf:
            - $ref: "#/components/schemas/TrackKnowledge"
            - type: "null"
        claims:
          type: array
          description: Grounded documentary-sourced facts (may be empty).
          items:
            $ref: "#/components/schemas/TrackClaim"
      required:
        - knowledge
    StationRef:
      type: object
      description: A station reference used in spin/segue attribution.
      properties:
        slug:
          type: string
        name:
          type: string
        stationClass:
          type: string
      required:
        - slug
        - name
        - stationClass
    ShowRef:
      type: object
      description: Show + DJ attribution for a spin, when the source exposes it.
      properties:
        name:
          type: string
        djName:
          type: ["string", "null"]
      required:
        - name
    RecordingSpin:
      type: object
      description: One logged play of a recording, with station + show attribution.
      properties:
        playedAt:
          type: string
        source:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
        station:
          $ref: "#/components/schemas/StationRef"
        show:
          anyOf:
            - $ref: "#/components/schemas/ShowRef"
            - type: "null"
        runId:
          type: ["integer", "null"]
          description: >-
            The archived station run (show + UTC broadcast day) this spin
            belongs to — an opaque id for /archive/station-runs/{runId}, so a
            song page can jump into the ghost run containing this play.
            Optional for older cached payloads.
      required:
        - playedAt
        - confidence
        - station
    RecordingSpins:
      type: object
      properties:
        mbid:
          type: string
        spins:
          type: array
          items:
            $ref: "#/components/schemas/RecordingSpin"
      required:
        - mbid
        - spins
    PickerRef:
      type: object
      description: A picker reference used in pick attribution.
      properties:
        name:
          type: string
        handle:
          type: string
        pickerType:
          type: string
        trustTier:
          type: integer
      required:
        - name
        - handle
        - pickerType
        - trustTier
    RecordingPick:
      type: object
      description: >-
        One curated pick of a recording — the reverse edge of the song–source
        graph. `runId` locates the specific list (null when the pick has no
        source URL and therefore no archived run).
      properties:
        picker:
          $ref: "#/components/schemas/PickerRef"
        runId:
          type: ["integer", "null"]
        listTitle:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        pickedAt:
          type: ["string", "null"]
        ordinal:
          type: ["integer", "null"]
          description: Position within an ordered list; null for unordered sources.
        trackCount:
          type: integer
          description: Total picks in the same run (0 when the pick has no run).
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
      required:
        - picker
        - runId
        - listTitle
        - sourceUrl
        - pickedAt
        - ordinal
        - trackCount
        - confidence
    RecordingPicks:
      type: object
      properties:
        mbid:
          type: string
        picks:
          type: array
          items:
            $ref: "#/components/schemas/RecordingPick"
      required:
        - mbid
        - picks
    PickerOverlap:
      type: object
      description: One picker sharing recordings with a station (exact MBID overlap).
      properties:
        picker:
          $ref: "#/components/schemas/PickerRef"
        sharedCount:
          type: integer
          description: Distinct recordings both the picker and the station touched.
      required:
        - picker
        - sharedCount
    StationPickerOverlaps:
      type: object
      properties:
        station:
          $ref: "#/components/schemas/StationRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PickerOverlap"
      required:
        - station
        - items
    StationOverlap:
      type: object
      description: One station sharing recordings with a picker (exact MBID overlap).
      properties:
        station:
          $ref: "#/components/schemas/StationRef"
        sharedCount:
          type: integer
          description: Distinct recordings both the station and the picker touched.
      required:
        - station
        - sharedCount
    PickerStationOverlaps:
      type: object
      properties:
        picker:
          $ref: "#/components/schemas/PickerRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/StationOverlap"
      required:
        - picker
        - items
    PickedLookupItem:
      type: object
      description: >-
        The strongest editorial pick for one MBID — used by the live dial's
        "also picked" badge.
      properties:
        mbid:
          type: string
        picker:
          $ref: "#/components/schemas/PickerRef"
        runId:
          type: ["integer", "null"]
        listTitle:
          type: ["string", "null"]
      required:
        - mbid
        - picker
        - runId
        - listTitle
    PickedLookup:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PickedLookupItem"
      required:
        - items
    StationRunSummary:
      type: object
      description: >-
        One documented station run — a show's plays on one UTC broadcast day.
        `runId` is opaque (fetch the tracklist via /archive/station-runs).
      properties:
        runId:
          type: integer
        date:
          type: string
          description: UTC broadcast day, YYYY-MM-DD.
        show:
          anyOf:
            - $ref: "#/components/schemas/ShowRef"
            - type: "null"
        spinCount:
          type: integer
        resolvedCount:
          type: integer
          description: Spins resolved to the MBID spine (replayable tracks).
        sourceUrl:
          type: ["string", "null"]
          description: >-
            Outbound link to the source's own archive for this run (e.g. the
            station's dated playlist page, or a manual spin's citation). Null
            when the source has no public per-day archive.
        startedAt:
          type: string
        endedAt:
          type: string
      required:
        - runId
        - date
        - spinCount
        - resolvedCount
        - sourceUrl
        - startedAt
        - endedAt
    StationArchive:
      type: object
      properties:
        station:
          $ref: "#/components/schemas/Station"
        runs:
          type: array
          items:
            $ref: "#/components/schemas/StationRunSummary"
      required:
        - station
        - runs
    ArchiveTrack:
      type: object
      description: >-
        One slot of an archived run, in documented order. `recording` is null
        when the track never resolved to the spine (raw metadata preserved —
        the honesty gradient stays visible even in replay).
      properties:
        position:
          type: integer
        playedAt:
          type: ["string", "null"]
        rawArtist:
          type: string
        rawTitle:
          type: string
        confidence:
          type: string
          enum: [recording_id, isrc, text, unresolved]
        recording:
          anyOf:
            - $ref: "#/components/schemas/NowPlayingRecording"
            - type: "null"
      required:
        - position
        - rawArtist
        - rawTitle
        - confidence
    StationRunDetail:
      type: object
      properties:
        station:
          $ref: "#/components/schemas/StationRef"
        run:
          $ref: "#/components/schemas/StationRunSummary"
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/ArchiveTrack"
      required:
        - station
        - run
        - tracks
    PickerRunSummary:
      type: object
      description: >-
        One documented picker run — all picks sharing one source URL (an NTS
        episode page, a list, a post), replayed in documented order.
      properties:
        runId:
          type: integer
        title:
          type: ["string", "null"]
          description: The run's own name (episode/list title), when known.
        sourceUrl:
          type: string
        pickedAt:
          type: ["string", "null"]
          description: When the picker documented this run (broadcast date).
        trackCount:
          type: integer
        resolvedCount:
          type: integer
          description: Picks resolved to the MBID spine (replayable tracks).
      required:
        - runId
        - sourceUrl
        - trackCount
        - resolvedCount
    PickerArchive:
      type: object
      properties:
        picker:
          $ref: "#/components/schemas/Picker"
        runs:
          type: array
          items:
            $ref: "#/components/schemas/PickerRunSummary"
      required:
        - picker
        - runs
    PickerRunDetail:
      type: object
      properties:
        picker:
          $ref: "#/components/schemas/Picker"
        run:
          $ref: "#/components/schemas/PickerRunSummary"
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/ArchiveTrack"
      required:
        - picker
        - run
        - tracks
    RecentStationRun:
      type: object
      description: >-
        One recent documented run with its station attribution, for the
        cross-station ghost radio browse surface.
      properties:
        station:
          $ref: "#/components/schemas/StationRef"
        run:
          $ref: "#/components/schemas/StationRunSummary"
      required:
        - station
        - run
    ArchiveRecentRuns:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecentStationRun"
      required:
        - items
    StationCoverage:
      type: object
      description: >-
        Archive depth for one station: how far back documented spins reach,
        how many resolved to the spine, and whether the deep backfill is still
        digging (`backfillDone=false` with a cursor means the walk is mid-way;
        no cursor means the source only supports live polling).
      properties:
        slug:
          type: string
        name:
          type: string
        spinCount:
          type: integer
        resolvedCount:
          type: integer
        oldestSpinAt:
          type: ["string", "null"]
        newestSpinAt:
          type: ["string", "null"]
        supportsBackfill:
          type: boolean
        backfillDone:
          type: boolean
        backfillCursor:
          type: ["string", "null"]
          description: Where the backward walk currently stands, when digging.
      required:
        - slug
        - name
        - spinCount
        - resolvedCount
        - oldestSpinAt
        - newestSpinAt
        - supportsBackfill
        - backfillDone
        - backfillCursor
    PickerCoverage:
      type: object
      description: >-
        Archive depth for one picker: documented runs (source-cited groups),
        total picks, and how many resolved to the spine.
      properties:
        handle:
          type: string
        name:
          type: string
        runCount:
          type: integer
        pickCount:
          type: integer
        resolvedCount:
          type: integer
        oldestPickedAt:
          type: ["string", "null"]
        newestPickedAt:
          type: ["string", "null"]
      required:
        - handle
        - name
        - runCount
        - pickCount
        - resolvedCount
        - oldestPickedAt
        - newestPickedAt
    ArchiveCoverage:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/StationCoverage"
        pickers:
          type: array
          items:
            $ref: "#/components/schemas/PickerCoverage"
      required:
        - stations
        - pickers
    SegueNext:
